<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2 id="pageTitle"></h2>

        <ul>
            <li><a href="#" onclick="showPage('dashboard')">Dashboard</a></li>
            <li><a href="#" onclick="showPage('students')">Students</a></li>
            <li><a href="#" onclick="showPage('teachers')">Teachers</a></li>
            <li><a href="#" onclick="showPage('classes')">Classes</a></li>
        </ul>
    </nav>

    <main>

        <!-- Dashboard -->
        <section id="dashboard" class="page">
            <h1>Dashboard</h1>
            <p>Welcome to School Management System</p>
        </section>

        <!-- Teachers -->
        <section id="teachers" class="page hidden">
            <h1>Teachers</h1>
            <input
                type="text"
                id="teacherName"
                placeholder="Teacher Name"
                style="width: 300px;"
            >
            <button onclick="addTeacher()">
                Add Teacher
            </button>


            <ul id="teacherList"></ul>

        </section>

        <!-- Students -->
        <section id="students" class="page hidden">
            <h1>Students</h1>

            <input type="text" id="studentIDSearch" placeholder="Student ID">

            <button onclick="getStudentID()">Search</button>

            <button onclick="resetStudentSearch()">Cancel</button>    
            
            

            <ul id="studentList"></ul>
            <div id="editModal" class="hidden">

                <h2>Edit Student</h2>

                <input type="hidden" id="editStudentId">

                <label>Name</label>
                <input type="text" id="editName">

                <label>Gender</label>
                <input type="text" id="editGender">

                <label>Phone</label>
                <input type="text" id="editPhone">

                <label>D.O.B</label>
                <input type="date" id="editDOB">

                <label>Class ID</label>
                <input type="number" id="editClassId">

                <button onclick="saveStudent()">
                    Save
                </button>

                <button onclick="closeModal()">
                    Cancel
                </button>

            </div>


        </section>

        <!-- Class -->
         <section id="classes" class="page hidden">
            <h1>Classes</h1>
            <ul id="classList"></ul>
         </section>

    </main>

    <script type="module" src="./js/scripts.js"></script>

</body>
</html>
